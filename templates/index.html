<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Parser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <nav class="top-nav">
      <a href="/" class="active">Generate</a>
      <a href="/editor">Create</a>
    </nav>

    <header>
      <h1>Tab Parser</h1>
      <p class="subtitle">Paste a guitar lesson transcript, get tabs.</p>
    </header>

    <section class="input-section">
      <div class="field">
        <label for="transcript">Lesson Transcript</label>
        <textarea id="transcript" rows="8" placeholder="Paste your guitar lesson transcript here..."></textarea>
      </div>
      <div class="generate-row">
        <button id="generate-btn" type="button">Generate Tabs</button>
        <span class="or-divider">or</span>
        <label class="btn-ghost upload-label" title="Load previously saved tabs">
          Load saved tabs
          <input id="load-file" type="file" accept=".json" style="display:none">
        </label>
      </div>
    </section>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>Analyzing transcript &amp; extracting chords&hellip; this may take a moment.</span>
    </div>

    <div id="error" class="error hidden"></div>

    <div id="output" class="output hidden"></div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
